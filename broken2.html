<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tab Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #e8e8e8;
    --text-dim: #888;
    --accent: #c8a84b;
    --accent-dim: #8a7030;
    --chord: #c8a84b;
    --section: #4a9eff;
    --danger: #e05555;
    --sidebar-w: 280px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    z-index: 10;
  }

  #title-display {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    flex: 1;
    min-width: 120px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #artist-display {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 300;
  }

  .btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, border-color 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }
  .btn:hover { background: var(--border); }
  .btn:active { background: var(--border); }
  .btn.accent {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }
  .btn.accent:hover { background: var(--accent); }

  /* ── CONTROLS ROW ── */
  #controls {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }

  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }

  #transpose-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
  }

  .small-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 30px;
    height: 30px;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .small-btn:hover { background: var(--border); }

  #font-val {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    min-width: 28px;
    text-align: center;
  }

  #scroll-speed {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  #scroll-speed::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  #scroll-btn { min-width: 80px; }
  #scroll-btn.active {
    background: var(--danger);
    border-color: var(--danger);
    color: #fff;
  }

  /* ── MAIN AREA (sidebar + content) ── */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  #sidebar-header {
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #search-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search-box:focus { border-color: var(--accent-dim); }
  #search-box::placeholder { color: var(--text-dim); }

  #song-count {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.04em;
  }

  #song-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }
  #song-list::-webkit-scrollbar { width: 4px; }
  #song-list::-webkit-scrollbar-track { background: transparent; }
  #song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Artist group */
  .artist-group { margin-bottom: 2px; }

  .artist-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.1s;
  }
  .artist-header:hover { background: var(--surface2); }

  .artist-arrow {
    font-size: 9px;
    color: var(--text-dim);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .artist-group.open .artist-arrow { transform: rotate(90deg); }

  .artist-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .artist-count {
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .song-items {
    display: none;
    padding: 0 0 4px 0;
  }
  .artist-group.open .song-items { display: block; }

  .song-item {
    padding: 5px 14px 5px 28px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.1s, color 0.1s;
    border-radius: 0;
  }
  .song-item:hover { background: var(--surface2); color: var(--text); }
  .song-item.active {
    color: var(--accent);
    background: rgba(200, 168, 75, 0.08);
  }

  /* ── LANDING / OPEN FOLDER ── */
  #landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 40px 20px;
  }

  #landing h1 {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  #landing p {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    max-width: 320px;
    line-height: 1.6;
  }

  .open-label {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    padding: 14px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .open-label:hover { background: var(--accent); }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.7;
  }

  #folder-input { display: none; }
  #file-input { display: none; }

  /* ── TAB VIEWER ── */
  #viewer {
    flex: 1;
    overflow-y: auto;
    padding: 24px 24px 60px;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  #viewer::-webkit-scrollbar { width: 6px; }
  #viewer::-webkit-scrollbar-track { background: transparent; }
  #viewer::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  #tab-content {
    font-family: var(--mono);
    font-size: 15px;
    max-width: 780px;
    margin: 0 auto;
  }

  .tab-title {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .tab-artist {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 24px;
    font-weight: 300;
  }

  .tab-meta {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 28px;
    font-family: var(--sans);
    letter-spacing: 0.05em;
  }

  .section-label {
    display: inline-block;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--section);
    border: 1px solid var(--section);
    border-radius: 4px;
    padding: 2px 8px;
    margin: 16px 0 8px;
  }

  .chord-row {
    color: var(--chord);
    font-weight: 600;
    font-family: var(--mono);
    white-space: pre;
    line-height: 1.4;
    min-height: 1.2em;
    margin: 0;
    padding: 0;
  }

  .lyric-row {
    color: var(--text);
    font-family: var(--mono);
    white-space: pre-wrap;
    line-height: 1.6;
    margin: 0 0 2px 0;
    padding: 0;
  }

  .line-pair {
    display: block;
    margin-bottom: 2px;
  }

  .blank-line {
    display: block;
    height: 0.7em;
  }

  /* ── EMPTY SIDEBAR STATE ── */
  #sidebar-empty {
    padding: 20px 14px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    text-align: center;
  }

  #loading-spinner {
    display: none;
    padding: 20px;
    text-align: center;
    font-size: 12px;
    color: var(--text-dim);
  }
</style>
</head>
<body>

<div id="topbar">
  <div style="display:flex;flex-direction:column;gap:2px;flex:1;min-width:0">
    <div id="title-display">Tab Viewer</div>
    <div id="artist-display"></div>
  </div>
  <button class="btn" id="refresh-btn">↺ Refresh</button>
</div>

<div id="controls">
  <div class="control-group">
    <span class="label">Key</span>
    <button class="small-btn" id="transpose-down">♭</button>
    <span id="transpose-val">0</span>
    <button class="small-btn" id="transpose-up">♯</button>
  </div>
  <div class="control-group">
    <span class="label">Size</span>
    <button class="small-btn" id="font-down">−</button>
    <span id="font-val">15</span>
    <button class="small-btn" id="font-up">+</button>
  </div>
  <div class="control-group">
    <span class="label">Speed</span>
    <input type="range" id="scroll-speed" min="1" max="10" value="3">
  </div>
  <button class="btn" id="scroll-btn">▶ Scroll</button>
</div>

<div id="main">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-header">
      <input type="text" id="search-box" placeholder="Search songs or artists…">
      <div id="song-count">Loading library...</div>
    </div>
    <div id="song-list">
      <div id="loading-spinner">⏳ Loading tabs from GitHub…</div>
      <div id="sidebar-empty" style="display:none">Open a folder of .cho files<br>to load your library</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div id="landing">
      <h1>// tab viewer</h1>
      <p id="loading-msg">Loading your library...</p>
      <p class="hint">
        Supports ChordPro .cho files<br>
        Transpose · Autoscroll · Font size
      </p>
    </div>
    <div id="viewer">
      <div id="tab-content"></div>
    </div>
  </div>
</div>

<script>
// ── CHORD THEORY ──
const SHARPS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLATS  = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

function noteIndex(note) {
  let i = SHARPS.indexOf(note);
  if (i === -1) i = FLATS.indexOf(note);
  return i;
}

function transposeChord(chord, semitones) {
  if (semitones === 0) return chord;
  const match = chord.match(/^([A-G][b#]?)(.*)$/);
  if (!match) return chord;
  const root = match[1], rest = match[2];
  const idx = noteIndex(root);
  if (idx === -1) return chord;
  const newIdx = ((idx + semitones) % 12 + 12) % 12;
  const useFlatScale = FLATS.includes(root) && !SHARPS.includes(root);
  let newRoot = semitones < 0 || useFlatScale ? FLATS[newIdx] : SHARPS[newIdx];
  const bassMatch = rest.match(/^(.*\/)([A-G][b#]?)(.*)$/);
  if (bassMatch) {
    const bassIdx = noteIndex(bassMatch[2]);
    if (bassIdx !== -1) {
      const newBassIdx = ((bassIdx + semitones) % 12 + 12) % 12;
      const newBass = semitones < 0 || useFlatScale ? FLATS[newBassIdx] : SHARPS[newBassIdx];
      return newRoot + bassMatch[1] + newBass + bassMatch[3];
    }
  }
  return newRoot + rest;
}

// ── STATE ──
let rawContent = '';
let transpose = 0;
let fontSize = 15;
let scrolling = false;
let scrollInterval = null;
let songTitle = '';
let songArtist = '';
let songKey = '';
let songType = '';
let library = []; // { artist, title, content, file }
let activeIndex = -1;

// ── PARSE CHORDPRO ──
function parseChordPro(text) {
  const lines = text.split('\n').map(l => l.replace(/\r$/, ''));
  const result = { title:'', artist:'', key:'', type:'', lines:[] };
  for (let line of lines) {
    const dir = line.match(/^\{(\w+):\s*(.*?)\s*\}$/);
    if (dir) {
      const key = dir[1].toLowerCase(), val = dir[2];
      if (key === 'title') result.title = val;
      else if (key === 'artist') result.artist = val;
      else if (key === 'key') result.key = val;
      else if (key === 'meta' && val.startsWith('type ')) result.type = val.slice(5);
      else if (key === 'comment' || key === 'c') result.lines.push({ type:'section', text: val });
      continue;
    }
    if (line.trim() === '') { result.lines.push({ type:'blank' }); continue; }
    const parts = [];
    const regex = /\[([^\]]+)\]|([^\[]+)/g;
    let m;
    while ((m = regex.exec(line)) !== null) {
      if (m[1] !== undefined) parts.push({ chord: m[1] });
      else parts.push({ text: m[2] });
    }
    result.lines.push({ type:'lyric', parts });
  }
  return result;
}

function renderChordPro(text, semitones) {
  const parsed = parseChordPro(text);
  songTitle = parsed.title;
  songArtist = parsed.artist;
  songKey = parsed.key;
  songType = parsed.type;

  let html = '';
  if (parsed.title) html += `<div class="tab-title">${esc(parsed.title)}</div>`;
  if (parsed.artist) html += `<div class="tab-artist">${esc(parsed.artist)}</div>`;
  const metaParts = [];
  if (parsed.key) metaParts.push(`Key: ${esc(transposeChord(parsed.key, semitones))}`);
  if (parsed.type) metaParts.push(esc(parsed.type));
  if (metaParts.length) html += `<div class="tab-meta">${metaParts.join(' · ')}</div>`;

  for (const line of parsed.lines) {
    if (line.type === 'blank') {
      html += '<span class="blank-line"></span>';
    } else if (line.type === 'section') {
      html += `<span class="section-label">${esc(line.text)}</span>\n`;
    } else if (line.type === 'lyric') {
      const hasChord = line.parts.some(p => p.chord);
      let chordStr = '', lyricStr = '';

      const segs = [];
      let pendingChord = null;
      for (const part of line.parts) {
        if (part.chord) {
          if (pendingChord !== null) segs.push({ chord: transposeChord(pendingChord, semitones), text: '', spacer: false });
          pendingChord = part.chord;
        } else {
          const txt = part.text || '';
          const isSpacer = pendingChord !== null && !/\w/.test(txt);
          segs.push({ chord: pendingChord ? transposeChord(pendingChord, semitones) : null, text: txt, spacer: isSpacer });
          pendingChord = null;
        }
      }
      if (pendingChord !== null) segs.push({ chord: transposeChord(pendingChord, semitones), text: '', spacer: false });

      for (const seg of segs) {
        const lyricText = seg.spacer ? '' : seg.text;
        const spacerText = seg.spacer ? seg.text : '';
        lyricStr += lyricText;
        if (seg.chord) {
          const col = seg.spacer ? chordStr.length : lyricStr.length - lyricText.length;
          while (chordStr.length < col) chordStr += ' ';
          const minEnd = col + Math.max(seg.chord.length, lyricText.length + spacerText.length) + 1;
          chordStr += seg.chord;
          while (chordStr.length < minEnd) chordStr += ' ';
        } else {
          while (chordStr.length < lyricStr.length) chordStr += ' ';
        }
      }

      if (hasChord) {
        html += `<span class="line-pair"><pre class="chord-row">${esc(chordStr)}</pre><pre class="lyric-row">${esc(lyricStr) || '\u00a0'}</pre></span>`;
      } else {
        html += `<pre class="lyric-row">${esc(lyricStr)}</pre>`;
      }
    }
  }
  return html;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── RENDER SONG ──
function render() {
  if (!rawContent) return;
  document.getElementById('tab-content').innerHTML = renderChordPro(rawContent, transpose);
  document.getElementById('title-display').textContent = songTitle || 'Tab Viewer';
  document.getElementById('artist-display').textContent = songArtist || '';
  const tv = document.getElementById('transpose-val');
  tv.textContent = transpose === 0 ? '0' : transpose > 0 ? '+' + transpose : String(transpose);
}

function openSong(content, index) {
  rawContent = content;
  transpose = 0;
  render();
  document.getElementById('landing').style.display = 'none';
  document.getElementById('viewer').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('viewer').scrollTop = 0;
  stopScroll();

  // Update active state in sidebar
  document.querySelectorAll('.song-item').forEach((el, i) => {
    el.classList.toggle('active', el.dataset.index == index);
  });
  activeIndex = index;
}

// ── AUTO-LOAD FROM GITHUB ──
async function autoLoadFromGitHub() {
  try {
    const owner = 'BoingDoingArran';
    const repo = 'TabViewer';
    const path = 'MyGuitarTabs';
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

    const response = await fetch(apiUrl);
    if (!response.ok) throw new Error('Failed to fetch tabs');
    
    const files = await response.json();
    if (!Array.isArray(files)) throw new Error('Invalid response');

    const choFiles = files.filter(f => f.name.match(/\.(cho|txt)$/i) && f.type === 'file');
    
    if (choFiles.length === 0) {
      console.log('No .cho files found in tabs folder');
      document.getElementById('loading-spinner').style.display = 'none';
      return;
    }

    library = [];
    let loaded = 0;

    for (const file of choFiles) {
      try {
        const fileResponse = await fetch(file.download_url);
        const content = await fileResponse.text();
        
        const titleMatch = content.match(/\{title:\s*(.*?)\s*\}/i);
        const artistMatch = content.match(/\{artist:\s*(.*?)\s*\}/i);
        const title = titleMatch ? titleMatch[1] : file.name.replace(/\.(cho|txt)$/i, '');
        const artist = artistMatch ? artistMatch[1] : 'Unknown Artist';
        
        library.push({ artist, title, content, fileName: file.name });
        loaded++;
      } catch (err) {
        console.error(`Failed to load ${file.name}:`, err);
      }
    }

    if (library.length > 0) {
      buildSidebar(library);
      document.getElementById('loading-spinner').style.display = 'none';
    }
  } catch (err) {
    console.error('Error loading from GitHub:', err);
    document.getElementById('loading-spinner').innerHTML = 'Could not load tabs. Try uploading files manually.';
  }
}

// ── LIBRARY: read folder ──
document.getElementById('folder-input').addEventListener('change', function(e) {
  const files = Array.from(e.target.files).filter(f => f.name.match(/\.(cho|txt)$/i));
  if (!files.length) return;

  library = [];
  let loaded = 0;

  files.forEach((file, i) => {
    const reader = new FileReader();
    reader.onload = function(ev) {
      const content = ev.target.result;
      const titleMatch = content.match(/\{title:\s*(.*?)\s*\}/i);
      const artistMatch = content.match(/\{artist:\s*(.*?)\s*\}/i);
      const title = titleMatch ? titleMatch[1] : file.name.replace(/\.(cho|txt)$/i, '');
      const artist = artistMatch ? artistMatch[1] : 'Unknown Artist';
      library.push({ artist, title, content, fileName: file.name });
      loaded++;
      if (loaded === files.length) buildSidebar(library);
    };
    reader.readAsText(file, 'utf-8');
  });

  this.value = '';
});

// ── BUILD SIDEBAR ──
function buildSidebar(songs, filter) {
  const list = document.getElementById('song-list');
  const countEl = document.getElementById('song-count');

  // Sort by artist then title
  const sorted = [...songs].sort((a, b) => {
    const ac = a.artist.toLowerCase(), bc = b.artist.toLowerCase();
    if (ac < bc) return -1; if (ac > bc) return 1;
    return a.title.toLowerCase().localeCompare(b.title.toLowerCase());
  });

  // Group by artist
  const groups = {};
  sorted.forEach((song, i) => {
    const origIdx = library.indexOf(song);
    if (!groups[song.artist]) groups[song.artist] = [];
    groups[song.artist].push({ ...song, index: origIdx });
  });

  const artists = Object.keys(groups).sort((a, b) => a.toLowerCase().localeCompare(b.toLowerCase()));

  countEl.textContent = `${songs.length} song${songs.length !== 1 ? 's' : ''} · ${artists.length} artist${artists.length !== 1 ? 's' : ''}`;

  list.innerHTML = '';

  if (!artists.length) {
    list.innerHTML = '<div id="sidebar-empty">No songs match</div>';
    return;
  }

  artists.forEach(artist => {
    const group = document.createElement('div');
    group.className = 'artist-group';
    if (filter || artists.length === 1) group.classList.add('open');

    const header = document.createElement('div');
    header.className = 'artist-header';
    header.innerHTML = `
      <span class="artist-arrow">▶</span>
      <span class="artist-name">${esc(artist)}</span>
      <span class="artist-count">${groups[artist].length}</span>
    `;
    header.addEventListener('click', () => group.classList.toggle('open'));

    const items = document.createElement('div');
    items.className = 'song-items';

    groups[artist].forEach(song => {
      const item = document.createElement('div');
      item.className = 'song-item';
      if (song.index === activeIndex) item.classList.add('active');
      item.dataset.index = song.index;
      item.textContent = song.title;
      item.title = song.title;
      item.addEventListener('click', () => {
        openSong(library[song.index].content, song.index);
      });
      items.appendChild(item);
    });

    group.appendChild(header);
    group.appendChild(items);
    list.appendChild(group);
  });
}

// ── SEARCH ──
document.getElementById('search-box').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!library.length) return;
  if (!q) { buildSidebar(library); return; }
  const filtered = library.filter(s =>
    s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q)
  );
  buildSidebar(filtered, true);
});

// ── SINGLE FILE OPEN ──
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    openSong(ev.target.result, -1);
  };
  reader.readAsText(file, 'utf-8');
  this.value = '';
});


// ── REFRESH BUTTON ──
document.getElementById('refresh-btn').addEventListener('click', () => {
  library = [];
  activeIndex = -1;
  rawContent = '';
  document.getElementById('viewer').style.display = 'none';
  document.getElementById('controls').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  document.getElementById('title-display').textContent = 'Tab Viewer';
  document.getElementById('artist-display').textContent = '';
  document.getElementById('search-box').value = '';
  stopScroll();
  autoLoadFromGitHub();
});

// ── TRANSPOSE ──
document.getElementById('transpose-up').addEventListener('click', () => {
  transpose = ((transpose + 1 + 12) % 12);
  if (transpose > 6) transpose -= 12;
  render();
});
document.getElementById('transpose-down').addEventListener('click', () => {
  transpose = ((transpose - 1 + 12) % 12);
  if (transpose > 6) transpose -= 12;
  render();
});

// ── FONT SIZE ──
document.getElementById('font-up').addEventListener('click', () => {
  fontSize = Math.min(fontSize + 1, 24);
  document.getElementById('font-val').textContent = fontSize;
  document.getElementById('tab-content').style.fontSize = fontSize + 'px';
});
document.getElementById('font-down').addEventListener('click', () => {
  fontSize = Math.max(fontSize - 1, 10);
  document.getElementById('font-val').textContent = fontSize;
  document.getElementById('tab-content').style.fontSize = fontSize + 'px';
});

// ── AUTOSCROLL ──
function stopScroll() {
  scrolling = false;
  clearInterval(scrollInterval);
  scrollInterval = null;
  document.getElementById('scroll-btn').textContent = '▶ Scroll';
  document.getElementById('scroll-btn').classList.remove('active');
}

document.getElementById('scroll-btn').addEventListener('click', () => {
  if (scrolling) { stopScroll(); return; }
  scrolling = true;
  document.getElementById('scroll-btn').textContent = '⏹ Stop';
  document.getElementById('scroll-btn').classList.add('active');
  const viewer = document.getElementById('viewer');
  scrollInterval = setInterval(() => {
    const speed = parseInt(document.getElementById('scroll-speed').value);
    viewer.scrollTop += speed * 0.4;
    if (viewer.scrollTop + viewer.clientHeight >= viewer.scrollHeight - 2) stopScroll();
  }, 30);
});

document.getElementById('viewer').addEventListener('touchstart', () => {
  if (scrolling) stopScroll();
}, { passive: true });

// ── INIT: Auto-load on page load ──
window.addEventListener('load', () => {
  autoLoadFromGitHub();
});
</script>
</body>
</html>
